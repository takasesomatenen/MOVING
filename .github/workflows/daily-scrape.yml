name: daily-coastal-scrape

# 毎日 海沿い格安物件(<=300万・面積付き) をスクレイプして data/ にコミットする。
# GitHub Actions ランナーは外部ネットワークが開いているため、開発サンドボックスと
# 違い実サイトへアクセスできる。schedule は既定ブランチ上でのみ発火する点に注意
# (PR マージ後に有効。マージ前は workflow_dispatch で手動実行して検証する)。

on:
  schedule:
    - cron: "17 21 * * *"   # 06:17 JST 相当 (UTC 21:17)
  workflow_dispatch:
    inputs:
      price_cap:
        description: "価格上限(万円)"
        required: false
        default: "300"

permissions:
  contents: write

concurrency:
  group: daily-scrape-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          python -m scraper.scrape --price-cap "${{ github.event.inputs.price_cap || '300' }}" | tee scrape.log

      - name: Build report HTML
        run: python -m scraper.report

      - name: Build gallery HTML
        run: python -m scraper.gallery

      - name: Commit results
        run: |
          git config user.name  "coastal-scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "変更なし(新規物件なし)"
          else
            git commit -m "data: 海沿い格安物件 日次更新"
            # feature branch は日次チェーン等が同時刻に push するため、
            # 単純 push は non-fast-forward で弾かれることがある。
            # rebase してからリトライし、push レースに耐えるようにする。
            pushed=""
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin "${{ github.ref_name }}" || true
              if git push origin HEAD:"${{ github.ref_name }}"; then
                pushed="yes"; break
              fi
              echo "push rejected, retrying ($i) ..."
              sleep $(( (RANDOM % 5) + 2 ))
            done
            if [ -z "$pushed" ]; then
              echo "::error::push failed after retries"; exit 1
            fi
          fi

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log
          path: scrape.log
