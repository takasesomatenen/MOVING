name: deploy-pages

# data/report/ のレポート群を GitHub Pages で配信する。
# 初回は configure-pages の enablement:true が Pages サイトを自動有効化するため、
# リポジトリ設定を手動で触らなくてよい(private リポジトリの場合は有料プランが必要)。
# 日次スクレイパーが data/report を更新するたびに自動で再デプロイされる。

on:
  push:
    branches: [main]
    paths:
      - "data/report/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -f data/report/*.html _site/ 2>/dev/null || true
          # ルート(/)はハブページにする。物件レポートは report.html として残す。
          if [ -f data/report/index.html ]; then cp -f data/report/index.html _site/report.html; fi
          if [ -f data/report/home.html ]; then cp -f data/report/home.html _site/index.html; fi
          ls -la _site

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
